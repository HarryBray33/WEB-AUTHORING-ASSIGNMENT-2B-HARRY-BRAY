<div class="contact-hero-background">
    <div class="contact-overlay">
        <section class="contact-section">
            <h1>Get in Touch</h1>
            <p class="intro">If you have any questions, comments or feedback about this website fill this form down below!</p>

            <form class="contact-form">
                <div class="form-group">
                    <input type="text" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <select required>
                        <option value="" disabled selected>General Inquiry</option>
                        <option>Artist Submission</option>
                        <option>Archive Question</option>
                        <option>Collab / Feature</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <textarea placeholder="Your Message..." rows="6" required></textarea>
                </div>
                <button type="submit">Send Message</button>
            </form>
        </section>
    </div>
